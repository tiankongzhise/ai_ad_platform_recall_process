<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册成功 - 广告回调平台</title>
    <link rel="stylesheet" href="/web/css/style.css">
    <style>
        .success-container {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }
        .success-card {
            background: white;
            border-radius: 16px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .success-icon {
            font-size: 64px;
            color: #28a745;
            margin-bottom: 20px;
        }
        .success-title {
            font-size: 28px;
            color: #333;
            margin-bottom: 16px;
        }
        .success-message {
            color: #666;
            margin-bottom: 24px;
            line-height: 1.6;
        }
        .api-token-section {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
            text-align: left;
        }
        .api-token-section h3 {
            margin: 0 0 12px 0;
            color: #333;
            font-size: 16px;
        }
        .api-token-section p {
            color: #666;
            font-size: 14px;
            margin-bottom: 16px;
        }
        .token-box {
            background: #fff;
            border: 2px dashed #667eea;
            border-radius: 8px;
            padding: 16px;
            font-family: monospace;
            font-size: 13px;
            word-break: break-all;
            color: #333;
            margin-bottom: 12px;
        }
        .token-tip {
            background: #e7f3ff;
            border-left: 4px solid #0066cc;
            padding: 12px 16px;
            border-radius: 4px;
            font-size: 13px;
            color: #333;
            margin-top: 16px;
        }
        .token-tip strong {
            color: #0066cc;
        }
        .countdown {
            color: #666;
            font-size: 14px;
            margin-bottom: 16px;
        }
        .countdown span {
            color: #667eea;
            font-weight: bold;
            font-size: 18px;
        }
        .btn-group {
            display: flex;
            gap: 12px;
            justify-content: center;
        }
        .btn {
            padding: 12px 32px;
            font-size: 16px;
        }
        .btn-copy {
            background: #28a745;
            color: white;
        }
        .btn-copy:hover {
            background: #218838;
        }
    </style>
</head>
<body>
    <div class="success-container">
        <div class="success-card">
            <div class="success-icon">✅</div>
            <h1 class="success-title">注册成功！</h1>
            <p class="success-message">
                您的账户已创建成功。<br>
                请妥善保管您的 ApiToken，它是您访问 API 的重要凭证。
            </p>

            <div class="api-token-section">
                <h3>🔑 您的 ApiToken</h3>
                <p>此 Token 用于 API 鉴权换取 JWT 令牌，请妥善保管，切勿泄露给他人。</p>
                <div class="token-box" id="apiTokenDisplay"></div>
                <button id="btnCopyToken" class="btn btn-copy">复制 Token</button>
                <div class="token-tip">
                    <strong>💡 提示：</strong>ApiToken 可在登录后的用户界面中查看和更换，无需担心丢失。
                </div>
            </div>

            <p class="countdown">
                <span id="countdownNum">10</span> 秒后自动跳转到登录页面
            </p>

            <div class="btn-group">
                <a href="/web/login.html" class="btn btn-primary">立即登录</a>
            </div>
        </div>
    </div>

    <script>
        // 从 URL 参数获取 ApiToken
        const urlParams = new URLSearchParams(window.location.search);
        const apiToken = urlParams.get('token');

        if (!apiToken) {
            // 如果没有 token，直接跳转到登录页
            window.location.href = '/web/login.html';
        }

        // 显示 ApiToken
        document.getElementById('apiTokenDisplay').textContent = apiToken;

        // 复制 Token 功能
        document.getElementById('btnCopyToken').addEventListener('click', () => {
            navigator.clipboard.writeText(apiToken).then(() => {
                alert('已复制到剪贴板');
            }).catch(() => {
                alert('复制失败，请手动复制');
            });
        });

        // 倒计时自动跳转
        let countdown = 10;
        const countdownElement = document.getElementById('countdownNum');

        const timer = setInterval(() => {
            countdown--;
            countdownElement.textContent = countdown;

            if (countdown <= 0) {
                clearInterval(timer);
                window.location.href = '/web/login.html';
            }
        }, 1000);
    </script>
</body>
</html>
