<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 广告回调平台</title>
    <link rel="stylesheet" href="/web/css/style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h1>广告回调平台</h1>
            <h2>注册</h2>
            <form id="registerForm">
                <div class="form-group">
                    <label for="username">用户名</label>
                    <input type="text" id="username" name="username" required minlength="3" maxlength="64" placeholder="3-64个字符">
                </div>
                <div class="form-group">
                    <label for="password">密码</label>
                    <input type="password" id="password" name="password" required minlength="8" placeholder="至少8位，包含字母和数字">
                </div>
                <div class="form-group">
                    <label for="confirmPassword">确认密码</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" required placeholder="再次输入密码">
                </div>
                <div class="form-group">
                    <label for="phone">手机号</label>
                    <div style="display: flex; gap: 8px;">
                        <input type="tel" id="phone" name="phone" required maxlength="11" placeholder="11位手机号" style="flex: 1;">
                        <button type="button" id="btnSendCode" class="btn btn-outline">获取验证码</button>
                    </div>
                </div>
                <div class="form-group" id="codeGroup" style="display: none;">
                    <label for="code">验证码</label>
                    <input type="text" id="code" name="code" maxlength="6" placeholder="输入6位验证码">
                </div>
                <button type="submit" class="btn btn-primary btn-block">注册</button>
            </form>
            <p class="auth-link">
                已有账号? <a href="/web/login.html">立即登录</a>
            </p>
            <div style="margin-top: 16px; text-align: center;">
                <a href="/web/login.html" class="btn btn-outline" style="display: inline-block; text-decoration: none;">← 返回登录</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script>
        const API_BASE = '';

        if (localStorage.getItem('token')) {
            window.location.href = '/web/index.html';
        }

        document.getElementById('btnSendCode').addEventListener('click', async () => {
            const phone = document.getElementById('phone').value;
            if (!phone || phone.length !== 11) {
                alert('请输入正确的11位手机号');
                return;
            }

            const btn = document.getElementById('btnSendCode');
            btn.disabled = true;
            let countdown = 60;

            try {
                await axios.post(`${API_BASE}/api/auth/send-code`, { phone });
                document.getElementById('codeGroup').style.display = 'block';
                alert('验证码已发送 (Mock: 930108)');
                
                const timer = setInterval(() => {
                    countdown--;
                    btn.textContent = `${countdown}秒后可重发`;
                    if (countdown <= 0) {
                        clearInterval(timer);
                        btn.disabled = false;
                        btn.textContent = '获取验证码';
                    }
                }, 1000);
            } catch (err) {
                alert('发送失败: ' + (err.response?.data?.message || err.message));
                btn.disabled = false;
            }
        });

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const phone = document.getElementById('phone').value;
            const code = document.getElementById('code').value;

            if (password !== confirmPassword) {
                alert('两次输入的密码不一致');
                return;
            }

            const passwordRegex = /^(?=.*[A-Za-z])(?=.*\d)[A-Za-z\d]{8,}$/;
            if (!passwordRegex.test(password)) {
                alert('密码至少8位，必须包含字母和数字');
                return;
            }

            try {
                const res = await axios.post(`${API_BASE}/api/auth/register`, {
                    username,
                    password,
                    phone: phone || undefined,
                    code: code || undefined
                });

                // 跳转到注册成功页面
                const apiToken = res.data.data.api_token;
                window.location.href = `/web/register-success.html?token=${encodeURIComponent(apiToken)}`;
            } catch (err) {
                alert('注册失败: ' + (err.response?.data?.message || err.message));
            }
        });
    </script>
</body>
</html>
