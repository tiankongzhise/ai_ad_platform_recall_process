<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 广告回调平台</title>
    <link rel="stylesheet" href="/web/css/style.css">
    <style>
        .api-token-box {
            background: #e7f3ff;
            border: 1px solid #b3d8ff;
            border-radius: 8px;
            padding: 16px;
            margin-top: 20px;
        }
        .api-token-box h3 {
            margin: 0 0 12px 0;
            color: #0066cc;
        }
        .api-token-box p {
            margin: 8px 0;
            font-size: 13px;
            color: #666;
        }
        .api-token-box code {
            display: block;
            background: #fff;
            padding: 12px;
            border-radius: 4px;
            word-break: break-all;
            font-size: 12px;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h1>广告回调平台</h1>
            <h2>注册</h2>
            <form id="registerForm">
                <div class="form-group">
                    <label for="username">用户名</label>
                    <input type="text" id="username" name="username" required minlength="3" maxlength="64" placeholder="3-64个字符">
                </div>
                <div class="form-group">
                    <label for="password">密码</label>
                    <input type="password" id="password" name="password" required minlength="8" placeholder="至少8位，包含字母和数字">
                </div>
                <div class="form-group">
                    <label for="confirmPassword">确认密码</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" required placeholder="再次输入密码">
                </div>
                <div class="form-group">
                    <label for="phone">手机号</label>
                    <div style="display: flex; gap: 8px;">
                        <input type="tel" id="phone" name="phone" required maxlength="11" placeholder="11位手机号" style="flex: 1;">
                        <button type="button" id="btnSendCode" class="btn btn-outline">获取验证码</button>
                    </div>
                </div>
                <div class="form-group" id="codeGroup" style="display: none;">
                    <label for="code">验证码</label>
                    <input type="text" id="code" name="code" maxlength="6" placeholder="输入6位验证码">
                </div>
                <button type="submit" class="btn btn-primary btn-block">注册</button>
            </form>
            <p class="auth-link">
                已有账号? <a href="/web/login.html">立即登录</a>
            </p>
            <div style="margin-top: 16px; text-align: center;">
                <a href="/web/login.html" class="btn btn-outline" style="display: inline-block; text-decoration: none;">← 返回登录</a>
            </div>
        </div>
    </div>

    <!-- 注册成功弹窗 -->
    <div id="successModal" class="modal" style="display: none;">
        <div class="modal-content">
            <h2>注册成功</h2>
            <p>您的账户已创建成功，请妥善保存以下信息：</p>
            <div class="api-token-box">
                <h3>您的 ApiToken（长期有效）</h3>
                <p>此Token用于调用API换取JWT令牌，请妥善保管，切勿泄露给他人。</p>
                <code id="apiTokenDisplay"></code>
                <p style="color: #cc0000; margin-top: 12px;">⚠️ 请立即复制保存，离开此页面后将无法再次查看！</p>
            </div>
            <button id="btnCopyToken" class="btn btn-primary btn-block" style="margin-top: 16px;">复制Token</button>
            <button id="btnGoLogin" class="btn btn-outline btn-block" style="margin-top: 8px;">前往登录</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script>
        const API_BASE = '';

        if (localStorage.getItem('token')) {
            window.location.href = '/web/index.html';
        }

        document.getElementById('btnSendCode').addEventListener('click', async () => {
            const phone = document.getElementById('phone').value;
            if (!phone || phone.length !== 11) {
                alert('请输入正确的11位手机号');
                return;
            }

            const btn = document.getElementById('btnSendCode');
            btn.disabled = true;
            let countdown = 60;

            try {
                await axios.post(`${API_BASE}/api/auth/send-code`, { phone });
                document.getElementById('codeGroup').style.display = 'block';
                alert('验证码已发送 (Mock: 930108)');
                
                const timer = setInterval(() => {
                    countdown--;
                    btn.textContent = `${countdown}秒后可重发`;
                    if (countdown <= 0) {
                        clearInterval(timer);
                        btn.disabled = false;
                        btn.textContent = '获取验证码';
                    }
                }, 1000);
            } catch (err) {
                alert('发送失败: ' + (err.response?.data?.message || err.message));
                btn.disabled = false;
            }
        });

        let registeredApiToken = '';

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const phone = document.getElementById('phone').value;
            const code = document.getElementById('code').value;

            if (password !== confirmPassword) {
                alert('两次输入的密码不一致');
                return;
            }

            const passwordRegex = /^(?=.*[A-Za-z])(?=.*\d)[A-Za-z\d]{8,}$/;
            if (!passwordRegex.test(password)) {
                alert('密码至少8位，必须包含字母和数字');
                return;
            }

            try {
                const res = await axios.post(`${API_BASE}/api/auth/register`, {
                    username,
                    password,
                    phone: phone || undefined,
                    code: code || undefined
                });

                // 显示成功提示
                alert('注册成功！请妥善保存您的ApiToken。');

                // 显示ApiToken弹窗
                registeredApiToken = res.data.data.api_token;
                document.getElementById('apiTokenDisplay').textContent = registeredApiToken;
                document.getElementById('successModal').style.display = 'flex';
            } catch (err) {
                alert('注册失败: ' + (err.response?.data?.message || err.message));
            }
        });

        // 复制Token
        document.getElementById('btnCopyToken').addEventListener('click', () => {
            navigator.clipboard.writeText(registeredApiToken).then(() => {
                alert('已复制到剪贴板');
            }).catch(() => {
                alert('复制失败，请手动复制');
            });
        });

        // 前往登录
        document.getElementById('btnGoLogin').addEventListener('click', () => {
            window.location.href = '/web/login.html';
        });
    </script>
</body>
</html>
